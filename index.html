<!-- Firebase ESM bridge: expose all firebase methods on window.FB so Babel scripts can call them -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9sS8MNSRreA45ZpBlePpEHpf9-BeLLOc",
  authDomain: "water-mgmt-psu.firebaseapp.com",
  projectId: "water-mgmt-psu",
  storageBucket: "water-mgmt-psu.firebasestorage.app",
  messagingSenderId: "537296710558",
  appId: "1:537296710558:web:e369b0df817a01a11f048f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.FB = {
  app, db, auth,
  fsGet: async (id) => {
    const snap = await getDoc(doc(db, "water_data", id));
    return snap.exists() ? snap.data() : {};
  },
  fsSet: (id, data) => setDoc(doc(db, "water_data", id), data, { merge: true }),
  fsGetUser: async (uid) => {
    const snap = await getDoc(doc(db, "users", uid));
    return snap.exists() ? snap.data() : { role: "viewer", name: "" };
  },
  fsSetUser: (uid, data) => setDoc(doc(db, "users", uid), data, { merge: true }),
  signIn: (email, pw) => signInWithEmailAndPassword(auth, email, pw),
  signOut: () => signOut(auth),
  onAuth: (cb) => onAuthStateChanged(auth, cb),
  createUser: (email, pw) => createUserWithEmailAndPassword(auth, email, pw),
};
window.dispatchEvent(new Event("firebase-ready"));
</script>

<style id="theme-vars">
:root{
  --brand-50:#eef6fc;--brand-100:#d9ebf8;--brand-200:#b4d6f0;--brand-300:#83bbe4;
  --brand-400:#4d97d3;--brand-500:#1f74ba;--brand-600:#155e9c;--brand-700:#114b7d;

</style>
<style id="base">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef2f7;--bg-grad-a:#eaf1f8;--bg-grad-b:#eef3f4;
  --surface:#ffffff;--surface-2:#f6f9fc;
  --border:#e3e8ef;--border-strong:#d3dae4;
  --ink-900:#0f1b2d;--ink-800:#1d2c41;--ink-700:#33415a;--ink-600:#4a586f;
  --ink-500:#6b7689;--ink-400:#94a0b3;--ink-300:#b9c2d0;
  --ok:#15824c;--ok-bg:#e7f4ec;--ok-border:#bfe3cd;
  --warn:#b06f0a;--warn-bg:#fdf2dc;--warn-border:#f3dca6;
  --bad:#c23b3b;--bad-bg:#fbeaea;--bad-border:#f1c4c4;
  --r-xs:6px;--r-sm:8px;--r:11px;--r-lg:14px;--r-xl:18px;
  --sh-xs:0 1px 2px rgba(16,30,54,.06);
  --sh-sm:0 1px 3px rgba(16,30,54,.07),0 1px 2px rgba(16,30,54,.04);
  --sh-md:0 4px 12px -2px rgba(16,30,54,.10),0 2px 6px -2px rgba(16,30,54,.06);
  --sh-lg:0 18px 44px -12px rgba(16,30,54,.22),0 6px 16px -8px rgba(16,30,54,.12);
  --font:'Sarabun',-apple-system,system-ui,sans-serif;
  --font-display:'IBM Plex Sans Thai','Sarabun',sans-serif;
}
html,body{height:100%}
body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--ink-800);background:var(--bg);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#root{height:100%}
::selection{background:var(--brand-200)}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:#c7d0dc;border-radius:99px;border:2px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:#aab7c7;background-clip:content-box}
*::-webkit-scrollbar-track{background:transparent}
.num{font-variant-numeric:tabular-nums lining-nums}
.spin{width:22px;height:22px;border:2.5px solid var(--brand-100);border-top-color:var(--brand-500);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.fade-in{animation:fadeIn .3s ease both}
.dt{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.dt thead th{position:sticky;top:0;z-index:2;background:var(--surface-2);color:var(--ink-500);
  font-weight:600;font-size:11.5px;letter-spacing:.01em;padding:9px 10px;text-align:center;
  border-bottom:1px solid var(--border-strong);white-space:nowrap}
.dt thead th small{display:block;font-weight:500;color:var(--ink-400);font-size:10.5px;margin-top:1px}
.dt tbody td{padding:5px 9px;text-align:center;border-bottom:1px solid var(--border);
  color:var(--ink-700);font-variant-numeric:tabular-nums lining-nums;vertical-align:middle}
.dt tbody tr:hover td{background:var(--brand-50)}
.dt tbody tr:nth-child(even) td{background:rgba(246,249,252,.55)}
.dt tbody tr:nth-child(even):hover td{background:var(--brand-50)}
.dt td.day{font-weight:600;color:var(--ink-500);width:46px}
.dt td.calc{background:#f0f7ff !important;color:var(--brand-700);font-weight:600}
.dt tr.total td{background:var(--ink-900) !important;color:#fff;font-weight:700;font-size:13px;border:none;position:sticky;bottom:0}
.dt tr.total td.calc{background:var(--brand-800) !important;color:#fff}
.ti{width:100%;min-width:54px;padding:5px 6px;border:1px solid transparent;border-radius:6px;
  font-family:var(--font);font-size:12.5px;text-align:center;background:transparent;color:var(--ink-800);
  font-variant-numeric:tabular-nums;transition:all .12s}
.ti:hover{border-color:var(--border-strong);background:var(--surface)}
.ti:focus{outline:none;border-color:var(--brand-400);background:var(--surface);box-shadow:0 0 0 3px var(--brand-100)}
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface)}
.tabchip{padding:7px 15px;border-radius:99px;border:1px solid var(--border-strong);background:var(--surface);
  font-family:var(--font);font-size:13px;font-weight:600;color:var(--ink-600);cursor:pointer;transition:all .15s;white-space:nowrap}
.tabchip.on{background:var(--brand-500);border-color:var(--brand-500);color:#fff;box-shadow:0 1px 3px rgba(21,94,156,.4)}
.tabchip:not(.on):hover{border-color:var(--brand-300);color:var(--brand-700)}
.skel{position:relative;overflow:hidden;background:var(--surface-2);border-radius:6px}
.skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);animation:shimmer 1.4s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
</style>
