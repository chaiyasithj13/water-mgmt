<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดการน้ำ — รพ.สงขลานครินทร์</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a6fb5;--blue-light:#e8f2fb;
  --teal:#0f7c63;--teal-light:#e0f5f0;
  --amber:#b06b00;--amber-light:#fff4e0;
  --red:#c0392b;--red-light:#fdecea;
  --green:#1e7e34;--green-light:#e8f5e9;
  --gray0:#f7f8fa;--gray1:#eef0f3;--gray2:#dde0e6;
  --gray3:#b0b6c3;--gray4:#6b7280;--gray5:#374151;
  --white:#fff;--text:#1f2937;--border:#dde1e8;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Sarabun',sans-serif;font-size:15px;color:var(--text);background:var(--gray0);min-height:100vh}
input,select,textarea,button{font-family:'Sarabun',sans-serif}
.btn{padding:7px 16px;border-radius:var(--radius);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{opacity:.88}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--gray5)}.btn-ghost:hover{background:var(--gray1)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.88}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-toggle{padding:5px 12px;border-radius:99px;border:1.5px solid;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.input-field{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--white)}
.input-field:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,181,.12)}
.label{font-size:13px;font-weight:500;color:var(--gray4);margin-bottom:4px;display:block}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:12px;font-weight:500}
.tag-admin{background:var(--blue-light);color:var(--blue)}
.tag-viewer{background:var(--teal-light);color:var(--teal)}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:var(--gray0);padding:8px 10px;text-align:center;font-weight:600;font-size:12px;color:var(--gray4);border-bottom:1px solid var(--border);border:1px solid var(--border)}
.table td{padding:6px 8px;border:1px solid var(--gray1);vertical-align:middle;text-align:center}
.table tr:hover td{background:var(--gray0)}
.stat-card{background:var(--gray0);border-radius:var(--radius);padding:12px 16px}
.stat-val{font-size:20px;font-weight:600;color:var(--blue)}
.stat-lbl{font-size:12px;color:var(--gray4);margin-top:2px}
.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--gray1);margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 14px;font-size:13px;background:none;border:none;color:var(--gray4);border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500;cursor:pointer;transition:color .15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--gray4);cursor:pointer;transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--gray1);color:var(--gray5)}
.nav-item.active{background:var(--blue-light);color:var(--blue)}
.nav-section{font-size:11px;font-weight:600;color:var(--gray3);text-transform:uppercase;letter-spacing:.06em;padding:10px 12px 3px}
.nav-subsection{font-size:11px;font-weight:600;color:var(--blue);padding:6px 12px 2px 20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px}
.alert-info{background:var(--blue-light);color:var(--blue)}
.alert-success{background:var(--green-light);color:var(--green)}
.alert-warn{background:var(--amber-light);color:var(--amber)}
.alert-danger{background:var(--red-light);color:var(--red)}
.badge-ok{color:var(--green);font-weight:500}
.badge-bad{color:var(--red);font-weight:500}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:999;font-size:15px;color:var(--gray4)}
.spinner{width:24px;height:24px;border:3px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.tbl-input{width:72px;padding:3px 5px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:'Sarabun',sans-serif;text-align:center}
.tbl-input:focus{outline:none;border-color:var(--blue)}
.sidebar{width:240px;min-height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden}
.sidebar.collapsed{width:0px;border:none}
.sidebar-fab{position:fixed;top:14px;left:14px;z-index:300;width:42px;height:42px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 3px 10px rgba(0,0,0,.25);transition:opacity .15s}.sidebar-fab:hover{opacity:.88}
.main-content{flex:1;padding:24px 28px;overflow-y:auto;min-width:0;transition:padding .2s}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:28px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.chart-container{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px}
.saving-toast{position:fixed;bottom:20px;right:24px;background:var(--blue);color:#fff;padding:8px 18px;border-radius:var(--radius);font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:200}
</style>
</head>
<body>
<div id="app"><div class="loading-overlay"><div class="spinner"></div>กำลังโหลด...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyC9sS8MNSRreA45ZpBlePpEHpf9-BeLLOc",
  authDomain:"water-mgmt-psu.firebaseapp.com",
  projectId:"water-mgmt-psu",
  storageBucket:"water-mgmt-psu.firebasestorage.app",
  messagingSenderId:"537296710558",
  appId:"1:537296710558:web:e369b0df817a01a11f048f"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

// ── Constants ──────────────────────────────────────────────────
const MN = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const MS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const CY = 2569;
const getDays = m => new Date(m>=7?2025:2026, m+1, 0).getDate();
const BLDG_END = ["อาคารโรงพยาบาล","อาคารเฉลิมพระบารมี (ส่วนหน้า)","อาคารเฉลิมพระบารมี (ส่วนหลัง)","อาคาร 100 ปี","อาคารรัตนชีวรักษ์ (สธ.)","อาคารศรีเวชวัฒน์"];
const SPOTS = {"อาคารโรงพยาบาล":"ห้องน้ำชั้น 12","อาคารเฉลิมพระบารมี (ส่วนหน้า)":"ห้องน้ำข้างเซเว่น","อาคารเฉลิมพระบารมี (ส่วนหลัง)":"ห้องล้างจาน","อาคาร 100 ปี":"ห้องน้ำชั้นล่าง","อาคารรัตนชีวรักษ์ (สธ.)":"ลานจอดรถ","อาคารศรีเวชวัฒน์":"ห้องน้ำชั้นล่าง"};
const CHART_COLORS = ["#1a6fb5","#0f7c63","#e05c00","#8b1a8b","#c0392b","#b06b00","#1e7e34","#2980b9"];

// พารามิเตอร์ อาคารวิจัยฯ
const PARAMS_RESEARCH = [
  {id:"ph",   label:"pH",          unit:"",      tanks:[{g:"EQ",ids:["EQ1","EQ2"]},{g:"Aeration",ids:["AE1","AE2","AE3","AE4"]},{g:"Effluent",ids:["EFF"]}]},
  {id:"tds",  label:"TDS",         unit:"mg/L",  tanks:[{g:"EQ",ids:["EQ1","EQ2"]},{g:"Effluent",ids:["EFF"]}]},
  {id:"cl",   label:"คลอรีน",      unit:"mg/L",  tanks:[{g:"Effluent",ids:["EFF"]}]},
  {id:"temp", label:"อุณหภูมิ",    unit:"°C",    tanks:[{g:"EQ",ids:["EQ1","EQ2"]},{g:"Aeration",ids:["AE1","AE2","AE3","AE4"]},{g:"Effluent",ids:["EFF"]}]},
  {id:"sv30", label:"SV30",        unit:"ml/L",  tanks:[{g:"Aeration",ids:["AE1","AE2","AE3","AE4"]}]},
  {id:"do",   label:"DO",          unit:"mg/L",  tanks:[{g:"Aeration",ids:["AE1","AE2","AE3","AE4"]}]},
];
// พารามิเตอร์ อาคาร สธ.
const PARAMS_STH = [
  {id:"ph",   label:"pH",  unit:"",      tanks:[{g:"EQ",ids:["EQ"]},{g:"Aeration",ids:["AE"]},{g:"Effluent",ids:["EFF"]}]},
  {id:"tds",  label:"TDS", unit:"mg/L",  tanks:[{g:"EQ",ids:["EQ"]},{g:"Effluent",ids:["EFF"]}]},
  {id:"cl",   label:"คลอรีน",  unit:"mg/L",  tanks:[{g:"Effluent",ids:["EFF"]}]},
  {id:"do",   label:"DO",  unit:"mg/L",  tanks:[{g:"Aeration",ids:["AE"]}]},
];

// ── State ──────────────────────────────────────────────────────
let S = {
  user:null, userRole:"viewer", userName:"",
  page:"dashboard", loading:true, saving:false,
  collapsed:false,
  data:{},
  modal:null,
  selMonth:new Date().getMonth(), selYear:CY,
  selTab:"", selParamTab:"ph",
  chartMode:"daily", // daily | monthly
  chartVisible:{water:true, waste:true, flow:true},
};

// ── Firestore ──────────────────────────────────────────────────
async function fsGet(id){const s=await getDoc(doc(db,"water_data",id));return s.exists()?s.data():{};}
async function fsSet(id,data){await setDoc(doc(db,"water_data",id),data,{merge:true});}
async function getUserRole(uid){const s=await getDoc(doc(db,"users",uid));return s.exists()?s.data():{role:"viewer",name:""};}
async function setUserRole(uid,role,name){await setDoc(doc(db,"users",uid),{role,name});}

async function loadData(id){
  if(S.data[id]!==undefined)return S.data[id];
  const d=await fsGet(id);S.data[id]=d;return d;
}

// ── Save debounce ──────────────────────────────────────────────
let saveTimers={};
function debouncedSave(id,data){
  clearTimeout(saveTimers[id]);
  saveTimers[id]=setTimeout(async()=>{
    S.saving=true; render();
    await fsSet(id,data);
    S.saving=false; render();
  },800);
}

// ── Render ─────────────────────────────────────────────────────
function setState(p){Object.assign(S,p);render();}
function render(){
  const root=document.getElementById("app");
  if(S.loading){root.innerHTML=`<div class="loading-overlay"><div class="spinner"></div>กำลังโหลด...</div>`;return;}
  if(!S.user){root.innerHTML=renderLogin();bindLogin();return;}
  root.innerHTML=`
    <div style="display:flex;min-height:100vh">
      ${renderSidebar()}
      <main class="main-content">${renderPage()}</main>
    </div>
    ${S.modal?renderModal():""}
    ${S.collapsed?`<button class="sidebar-fab" onclick="toggleSidebar()" title="เปิดเมนู"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>`:""}
    ${S.saving?`<div class="saving-toast">กำลังบันทึก...</div>`:""}
  `;
  bindEvents();
  renderCharts();
}

// ── LOGIN ──────────────────────────────────────────────────────
function renderLogin(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f2fb,#e0f5f0)">
  <div style="width:380px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:56px;background:var(--blue);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <h1 style="font-size:22px;font-weight:600;color:var(--gray5)">ระบบจัดการน้ำ</h1>
      <p style="font-size:13px;color:var(--gray4);margin-top:4px">โรงพยาบาลสงขลานครินทร์</p>
    </div>
    <div class="card">
      <div id="login-err" style="display:none;margin-bottom:14px" class="alert alert-danger"></div>
      <div style="margin-bottom:14px"><label class="label">อีเมล</label><input class="input-field" id="login-email" type="email" placeholder="email@example.com" autofocus></div>
      <div style="margin-bottom:20px"><label class="label">รหัสผ่าน</label><input class="input-field" id="login-pass" type="password" placeholder="รหัสผ่าน"></div>
      <button class="btn btn-primary" id="btn-login" style="width:100%;padding:10px">เข้าสู่ระบบ</button>
    </div>
  </div></div>`;
}
function bindLogin(){
  const doLogin=async()=>{
    const e=document.getElementById("login-email")?.value?.trim();
    const p=document.getElementById("login-pass")?.value;
    const err=document.getElementById("login-err");
    if(!e||!p){err.textContent="กรุณากรอกอีเมลและรหัสผ่าน";err.style.display="block";return;}
    try{err.style.display="none";document.getElementById("btn-login").textContent="กำลังเข้าสู่ระบบ...";
      await signInWithEmailAndPassword(auth,e,p);}
    catch{err.textContent="อีเมลหรือรหัสผ่านไม่ถูกต้อง";err.style.display="block";document.getElementById("btn-login").textContent="เข้าสู่ระบบ";}
  };
  document.getElementById("btn-login")?.addEventListener("click",doLogin);
  document.getElementById("login-pass")?.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
}

// ── SIDEBAR ────────────────────────────────────────────────────
function renderSidebar(){
  const c=S.collapsed;
  const isAdmin=S.userRole==="admin";
  const ni=(id,label,icon,indent=0)=>`
    <button class="nav-item${S.page===id?" active":""}" onclick="navTo('${id}')" title="${label}" style="padding-left:${12+indent*10}px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="flex-shrink:0"><path d="${icon}"/></svg>
      ${!c?`<span style="font-size:${indent>0?12:13}px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${label}</span>`:""}
    </button>`;
  const ns=(label)=>!c?`<div class="nav-section">${label}</div>`:"";
  const nss=(label)=>!c?`<div class="nav-subsection">${label}</div>`:"";
  const ico={
    home:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z",
    daily:"M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z",
    chart:"M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z",
    param:"M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2",
    water:"M12 3v1m0 16v1m8.66-10h-1M4.34 12h-1",
    lab:"M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517",
    user:"M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0",
  };
  return `<div class="sidebar${c?" collapsed":""}">
    <div style="padding:12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
      <div style="width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      ${!c?`<div style="overflow:hidden"><div style="font-size:13px;font-weight:600;color:var(--gray5);white-space:nowrap">ระบบจัดการน้ำ</div><div style="font-size:11px;color:var(--gray3)">รพ.สงขลานครินทร์</div></div>`:""}
      <button onclick="toggleSidebar()" style="margin-left:auto;background:none;border:none;color:var(--gray3);cursor:pointer;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:1px">
      ${ni("dashboard","ภาพรวม",ico.home)}
      ${ns("ระบบบำบัดน้ำเสีย")}
      ${nss("อาคารวิจัยฯ")}
      ${ni("ww-research-daily","รายงานประจำวัน",ico.daily,1)}
      ${ni("ww-research-param","พารามิเตอร์น้ำเสีย",ico.param,1)}
      ${ni("ww-research-analysis","ผลวิเคราะห์น้ำ",ico.lab,1)}
      ${ni("ww-research-summary","สรุปรายเดือน",ico.chart,1)}
      ${nss("อาคารรัตนชีวรักษ์ (สธ.)")}
      ${ni("ww-sth-daily","รายงานประจำวัน",ico.daily,1)}
      ${ni("ww-sth-param","พารามิเตอร์น้ำเสีย",ico.param,1)}
      ${ni("ww-sth-analysis","ผลวิเคราะห์น้ำ",ico.lab,1)}
      ${ni("ww-sth-summary","สรุปรายเดือน",ico.chart,1)}
      ${ns("ระบบประปา")}
      ${ni("water-usage","ปริมาณการใช้น้ำประปา",ico.water)}
      ${ni("chlorine-start","คลอรีน (ต้นทาง) รายวัน",ico.param)}
      ${ni("chlorine-end","คลอรีน (ปลายทาง) รายสัปดาห์",ico.param)}
      ${ni("water-quality","ค่า pH และ TDS น้ำประปา",ico.param)}
      ${ni("water-analysis","ผลการตรวจวิเคราะห์น้ำ",ico.lab)}
      ${isAdmin?ns("ผู้ดูแลระบบ"):""}
      ${isAdmin?ni("manage-users","จัดการผู้ใช้",ico.user):""}
    </div>
    ${!c?`<div style="padding:10px;border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="width:30px;height:30px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue)">${(S.userName||"?")[0]}</div>
        <div><div style="font-size:12px;font-weight:500">${S.userName}</div><span class="tag tag-${S.userRole}">${S.userRole==="admin"?"ผู้ดูแล":"ผู้ดู"}</span></div>
      </div>

function mySel(){
  return `<select class="input-field" style="width:130px" onchange="chMonth(this.value)">
    ${MN.map((m,i)=>`<option value="${i}"${S.selMonth===i?" selected":""}>${m}</option>`).join("")}
  </select>
  <select class="input-field" style="width:86px" onchange="chYear(this.value)">
    ${[2568,2569,2570].map(y=>`<option value="${y}"${S.selYear===y?" selected":""}>${y}</option>`).join("")}
  </select>`;
}

function avg(a,b){
  const x=parseFloat(a),y=parseFloat(b);
  const ok1=!isNaN(x)&&a!=="",ok2=!isNaN(y)&&b!=="";
  if(ok1&&ok2)return((x+y)/2).toFixed(2);
  if(ok1)return x.toFixed(2);
  if(ok2)return y.toFixed(2);
  return null;
}

// ── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard(){
  const m=S.selMonth,y=S.selYear,days=getDays(m);
  const rd=S.data[`ww_research_${y}_${m}`]||{};
  const sd=S.data[`ww_sth_${y}_${m}`]||{};
  const wd=S.data[`water_usage_${y}_${m}`]||{};
  const cd=S.data[`chlorine_start_${y}_${m}`]||{};
  let tWW=0,tSth=0,tWater=0,clOk=0,clTotal=0;
  for(let d=1;d<=days;d++){
    if(rd[d]?.waste)tWW+=+rd[d].waste||0;
    if(sd[d]?.waste)tSth+=+sd[d].waste||0;
    const wr=wd[d];if(wr)tWater+=(+wr.hospital||0)+(+wr.khuan||0)+(+wr.dorm||0);
    const cl=+cd[d]?.free_chlorine;if(!isNaN(cl)&&cl>0){clTotal++;if(cl>=0.2)clOk++;}
  }
  return `<div>
    <h2 style="font-size:20px;font-weight:600;margin-bottom:4px">ภาพรวมระบบ</h2>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <p style="font-size:13px;color:var(--gray4)">${MN[m]} ${y}</p>${mySel()}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px">
      ${[["น้ำเสีย (วิจัยฯ)",tWW.toFixed(1),"ลบ.ม.","var(--blue)"],
         ["น้ำเสีย (สธ.)",tSth.toFixed(1),"ลบ.ม.","var(--teal)"],
         ["การใช้น้ำประปา",tWater.toLocaleString(),"ลบ.ม.","var(--amber)"],
         ["คลอรีนผ่านเกณฑ์",clTotal>0?`${clOk}/${clTotal} วัน`:"-",clTotal>0?`(${Math.round(clOk/clTotal*100)}%)`:"",clTotal>0&&clOk/clTotal<0.9?"var(--red)":"var(--green)"]
        ].map(([l,v,u,c])=>`<div class="card"><div style="font-size:12px;color:var(--gray4);margin-bottom:6px">${l}</div><div style="font-size:24px;font-weight:600;color:${c}">${v}</div><div style="font-size:12px;color:var(--gray3)">${u}</div></div>`).join("")}
    </div>
    <div class="alert alert-info" style="font-size:13px">
      <strong>ปีงบประมาณ ${y}</strong> — ข้อมูล Real-time ทุกคนเห็นพร้อมกัน | URL: <strong>water-mgmt-psu.web.app</strong>
    </div>
  </div>`;
}

// ── CHARTS ────────────────────────────────────────────────────
let chartInstances={};
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

function renderCharts(){
  const m=S.selMonth,y=S.selYear;
  if(S.page==="ww-research-daily"||S.page==="ww-sth-daily"){
    const bldg=S.page==="ww-research-daily"?"research":"sth";
    const docId=`ww_${bldg}_${y}_${m}`;
    const rows=S.data[docId]||{};
    setTimeout(()=>drawWWChart(rows,m,y,bldg),50);
  }
  if(S.page==="ww-research-param"||S.page==="ww-sth-param"){
    const bldg=S.page==="ww-research-param"?"research":"sth";
    const PARAMS=bldg==="research"?PARAMS_RESEARCH:PARAMS_STH;
    const param=PARAMS.find(p=>p.id===S.selParamTab)||PARAMS[0];
    const docId=`ww_param_${bldg}_${param.id}_${y}_${m}`;
    const rows=S.data[docId]||{};
    setTimeout(()=>drawParamChart(rows,param,m,y,bldg),50);
  }
}

function drawWWChart(rows,m,y,bldg){
  destroyChart("chart-ww-main");
  const canvas=document.getElementById("chart-ww-main");
  if(!canvas)return;
  let labels,datasets;
  if(S.chartMode==="daily"){
    const days=getDays(m);
    labels=Array.from({length:days},(_,i)=>i+1);
    const waterData=labels.map(d=>+rows[d]?.water||null);
    const wasteData=labels.map(d=>+rows[d]?.waste||null);
    const flowData=labels.map(d=>+rows[d]?.ww_flow||null);
    datasets=[
      {label:"น้ำประปา",data:waterData,borderColor:"#1a6fb5",backgroundColor:"#1a6fb522",tension:0.3,hidden:!S.chartVisible.water},
      {label:"น้ำเสีย",data:wasteData,borderColor:"#0f7c63",backgroundColor:"#0f7c6322",tension:0.3,hidden:!S.chartVisible.waste},
      {label:"Flowmeter",data:flowData,borderColor:"#e05c00",backgroundColor:"#e05c0022",tension:0.3,hidden:!S.chartVisible.flow},
    ];
  } else {
    labels=MS;
    const waterData=MS.map((_,mi)=>{const r2=S.data[`ww_${bldg}_${y}_${mi}`]||{};let t=0,c=0;for(let d=1;d<=getDays(mi);d++){if(r2[d]?.water){t+=+r2[d].water||0;c++;}}return c>0?+(t/c).toFixed(1):null;});
    const wasteData=MS.map((_,mi)=>{const r2=S.data[`ww_${bldg}_${y}_${mi}`]||{};let t=0,c=0;for(let d=1;d<=getDays(mi);d++){if(r2[d]?.waste){t+=+r2[d].waste||0;c++;}}return c>0?+(t/c).toFixed(1):null;});
    const flowData=MS.map((_,mi)=>{const r2=S.data[`ww_${bldg}_${y}_${mi}`]||{};let t=0,c=0;for(let d=1;d<=getDays(mi);d++){if(r2[d]?.ww_flow){t+=+r2[d].ww_flow||0;c++;}}return c>0?+(t/c).toFixed(1):null;});
    datasets=[
      {label:"น้ำประปา (เฉลี่ย/วัน)",data:waterData,borderColor:"#1a6fb5",backgroundColor:"#1a6fb522",tension:0.3,hidden:!S.chartVisible.water},
      {label:"น้ำเสีย (เฉลี่ย/วัน)",data:wasteData,borderColor:"#0f7c63",backgroundColor:"#0f7c6322",tension:0.3,hidden:!S.chartVisible.waste},
      {label:"Flowmeter (เฉลี่ย/วัน)",data:flowData,borderColor:"#e05c00",backgroundColor:"#e05c0022",tension:0.3,hidden:!S.chartVisible.flow},
    ];
  }
  chartInstances["chart-ww-main"]=new Chart(canvas,{type:"line",data:{labels,datasets},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{position:"top"}},scales:{y:{beginAtZero:true,title:{display:true,text:"ลบ.ม."}}}}});
}

function drawParamChart(rows,param,m,y,bldg){
  destroyChart("chart-param-main");
  const canvas=document.getElementById("chart-param-main");
  if(!canvas)return;
  const allTanks=param.tanks.flatMap(g=>g.ids.map(id=>id));
  let labels,datasets;
  if(S.chartMode==="daily"){
    const days=getDays(m);
    labels=Array.from({length:days},(_,i)=>i+1);
    datasets=allTanks.map((tid,ci)=>({
      label:tid,
      data:labels.map(d=>{
        const a=avg(rows[d]?.[tid]?.m,rows[d]?.[tid]?.a);
        return a!==null?+a:null;
      }),
      borderColor:CHART_COLORS[ci%CHART_COLORS.length],
      backgroundColor:CHART_COLORS[ci%CHART_COLORS.length]+"22",
      tension:0.3,spanGaps:true,
    }));
  } else {
    labels=MS;
    datasets=allTanks.map((tid,ci)=>({
      label:tid,
      data:MS.map((_,mi)=>{
        const r2=S.data[`ww_param_${bldg}_${param.id}_${y}_${mi}`]||{};
        const days2=getDays(mi);
        let sum=0,cnt=0;
        for(let d=1;d<=days2;d++){
          const a=avg(r2[d]?.[tid]?.m,r2[d]?.[tid]?.a);
          if(a!==null){sum+=+a;cnt++;}
        }
        return cnt>0?+(sum/cnt).toFixed(2):null;
      }),
      borderColor:CHART_COLORS[ci%CHART_COLORS.length],
      backgroundColor:CHART_COLORS[ci%CHART_COLORS.length]+"22",
      tension:0.3,spanGaps:true,
    }));
  }
  chartInstances["chart-param-main"]=new Chart(canvas,{type:"line",data:{labels,datasets},options:{responsive:true,interaction:{mode:"index",intersect:false},plugins:{legend:{position:"top"}},scales:{y:{beginAtZero:false,title:{display:true,text:param.unit||param.label}}}}});
}

// ── CSV exports ───────────────────────────────────────────────
function dlCsv(filename,headers,rows){
  const bom="\uFEFF";
  const lines=[headers.join(","),...rows.map(r=>r.map(c=>`"${c??""}"`).join(","))];
  const blob=new Blob([bom+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
window.exportWWDaily=(docId,title)=>{
  const rows=S.data[docId]||{},m=S.selMonth,y=S.selYear,days=getDays(m);
  dlCsv(`น้ำเสีย_${title}_${MN[m]}_${y}.csv`,
    ["วันที่","น้ำประปา","น้ำเสีย","Flowmeter","น้ำทิ้ง","ไฟฟ้า(kW)","ค่าไฟ/หน่วย","ค่าไฟรวม","คลอรีน(ล.)","ค่าคลอรีน"],
    Array.from({length:days},(_,i)=>i+1).map(d=>{const r=rows[d]||{};return[d,r.water,r.water?(+r.water*0.8).toFixed(2):"",r.ww_flow,r.waste_out,r.elec_kwh,r.elec_rate,r.elec_total,r.chlorine_l,r.chlorine_cost];}));
};
window.exportParam=(docId,label,title)=>{
  const rows=S.data[docId]||{},m=S.selMonth,y=S.selYear,days=getDays(m);
  const bldg=S.page.includes("research")?"research":"sth";
  const PARAMS=bldg==="research"?PARAMS_RESEARCH:PARAMS_STH;
  const param=PARAMS.find(p=>p.id===S.selParamTab)||PARAMS[0];
  const allTanks=param.tanks.flatMap(g=>g.ids.map(id=>id));
  const headers=["วันที่",...allTanks.flatMap(t=>[`${t}(เช้า)`,`${t}(บ่าย)`,"เฉลี่ย"])];
  const dataRows=Array.from({length:days},(_,i)=>i+1).map(d=>[d,...allTanks.flatMap(t=>[rows[d]?.[t]?.m||"",rows[d]?.[t]?.a||"",avg(rows[d]?.[t]?.m,rows[d]?.[t]?.a)||""])]);
  dlCsv(`param_${label}_${title}_${MN[m]}_${y}.csv`,headers,dataRows);
};
window.exportWWSummary=(bldg,title)=>{
  const y=S.selYear;
  dlCsv(`สรุป_${title}_${y}.csv`,
    ["เดือน","น้ำประปา","น้ำเสีย","Flowmeter","น้ำทิ้ง","ไฟฟ้า","ค่าไฟ","คลอรีน","ค่าคลอรีน","เฉลี่ย/วัน"],
    MN.map((mn,mi)=>{
      const rows=S.data[`ww_${bldg}_${y}_${mi}`]||{},days=getDays(mi);
      let tW=0,tWaste=0,tF=0,tO=0,tE=0,tC=0,tCl=0,tClC=0,cnt=0;
      for(let d=1;d<=days;d++){const r=rows[d]||{};if(r.water){tW+=+r.water||0;tWaste+=r.water?(+r.water*0.8):0;tF+=+r.ww_flow||0;tO+=+r.waste_out||0;tE+=+r.elec_kwh||0;tC+=+r.elec_total||0;tCl+=+r.chlorine_l||0;tClC+=+r.chlorine_cost||0;cnt++;}}
      return[mn,tW.toFixed(0),tWaste.toFixed(1),tF.toFixed(1),tO.toFixed(1),tE.toFixed(0),tC.toFixed(2),tCl.toFixed(1),tClC.toFixed(2),cnt>0?(tWaste/cnt).toFixed(2):0];
    }));
};

// ── Preload ────────────────────────────────────────────────────
async function preload(page){
  const m=S.selMonth,y=S.selYear;
  const ids=[];
  if(page==="dashboard") ids.push(`ww_research_${y}_${m}`,`ww_sth_${y}_${m}`,`water_usage_${y}_${m}`,`chlorine_start_${y}_${m}`);
  else if(page==="ww-research-daily"||page==="ww-sth-daily"){
    const b=page.includes("research")?"research":"sth";
    ids.push(`ww_${b}_${y}_${m}`);
    if(S.chartMode==="monthly") for(let i=0;i<12;i++)ids.push(`ww_${b}_${y}_${i}`);
  }
  else if(page==="ww-research-param"||page==="ww-sth-param"){
    const b=page.includes("research")?"research":"sth";
    const PARAMS=b==="research"?PARAMS_RESEARCH:PARAMS_STH;
    const pid=S.selParamTab||(PARAMS[0].id);
    ids.push(`ww_param_${b}_${pid}_${y}_${m}`);
    if(S.chartMode==="monthly") for(let i=0;i<12;i++)ids.push(`ww_param_${b}_${pid}_${y}_${i}`);
  }
  else if(page==="ww-research-analysis"){
    const m2=S.wwAnalysisMonth??new Date().getMonth();
    const y2=S.wwAnalysisYear??S.selYear;
    ids.push(`ww_analysis_research_${y2}_${m2}`);
  }
  else if(page==="ww-sth-analysis"){
    const m2=S.wwAnalysisMonth??new Date().getMonth();
    const y2=S.wwAnalysisYear??S.selYear;
    ids.push(`ww_analysis_sth_${y2}_${m2}`);
  }
  else if(page==="ww-research-summary") for(let i=0;i<12;i++)ids.push(`ww_research_${y}_${i}`);
  else if(page==="ww-sth-summary") for(let i=0;i<12;i++)ids.push(`ww_sth_${y}_${i}`);
  else if(page==="water-usage") ids.push(`water_usage_${y}_${m}`);
  else if(page==="chlorine-start") ids.push(`chlorine_start_${y}_${m}`);
  else if(page==="chlorine-end") ids.push(`chlorine_end_${y}_${m}`);
  else if(page==="water-quality") ids.push(`water_quality_${y}_${m}`);
  else if(page==="water-analysis") ids.push(`water_analysis_${S.selTab||"tap"}`);
  const missing=ids.filter(id=>S.data[id]===undefined);
  if(missing.length>0){
    const results=await Promise.all(missing.map(id=>fsGet(id)));
    missing.forEach((id,i)=>{S.data[id]=results[i];});
  }
}

onAuthStateChanged(auth,async(user)=>{

    const profile=await getUserRole(user.uid);
    S.user=user; S.userRole=profile.role||"viewer"; S.userName=profile.name||user.email;

  } else {
    S.user=null;S.userRole="viewer";S.userName="";S.data={};
    setState({loading:false});
  }
});
